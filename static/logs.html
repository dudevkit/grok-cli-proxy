<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Activity Log — GrokProxy</title>
<style>
:root {
  --bg: #000; --surface: #0a0a0a; --border: #222; --text: #ededed;
  --secondary: #a1a1aa; --tertiary: #71717a;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6; --purple: #a78bfa;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px; height: 100vh; display: flex; flex-direction: column;
}
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.topbar .brand { font-weight: 600; font-size: 14px; }
.topbar a { color: var(--secondary); text-decoration: none; font-size: 12px; }
.topbar a:hover { color: var(--text); }
.spacer { flex: 1; }
.topbar .controls { display: flex; gap: 8px; align-items: center; }
.ctrl-btn {
  padding: 4px 10px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: transparent; color: var(--secondary); cursor: pointer;
  font-family: inherit;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--tertiary); }
.ctrl-btn.active { background: var(--success); color: #000; border-color: var(--success); }
.ctrl-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
.badge-count {
  font-size: 11px; color: var(--tertiary);
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-variant-numeric: tabular-nums;
}
/* Split layout */
.split {
  flex: 1; display: flex; overflow: hidden;
}
.panel {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
}
.panel:first-child { border-right: 1px solid var(--border); }
.panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.panel-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--secondary);
}
.panel-count {
  font-size: 10px; color: var(--tertiary);
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
}
.panel-controls { margin-left: auto; display: flex; gap: 4px; }
.panel-btn {
  padding: 2px 6px; font-size: 10px; font-weight: 500;
  border: 1px solid var(--border); border-radius: 4px;
  background: transparent; color: var(--tertiary); cursor: pointer;
  font-family: inherit;
}
.panel-btn:hover { color: var(--text); border-color: var(--tertiary); }
.panel-btn.active { background: var(--success); color: #000; border-color: var(--success); }
/* Log panels */
.log-wrap {
  flex: 1; overflow-y: auto; padding: 4px 0;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 12px; line-height: 1.6;
}
.log-wrap::-webkit-scrollbar { width: 4px; }
.log-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.log-line {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 16px; white-space: nowrap;
}
.log-line:hover { background: rgba(255,255,255,0.02); }
.log-line.filtered { display: none; }
.log-time { color: var(--tertiary); font-size: 11px; flex-shrink: 0; width: 62px; }
.log-dot {
  display: inline-block; width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}
.dot-ok { background: var(--success); box-shadow: 0 0 4px var(--success); }
.dot-err { background: var(--danger); box-shadow: 0 0 4px var(--danger); }
.dot-info { background: var(--info); box-shadow: 0 0 4px var(--info); }
.dot-warn { background: var(--warning); box-shadow: 0 0 4px var(--warning); }
.dot-purple { background: var(--purple); box-shadow: 0 0 4px var(--purple); }
.dot-dim { background: var(--tertiary); }
.log-tag {
  display: inline-flex; align-items: center; padding: 0 5px;
  font-size: 10px; font-weight: 600; border-radius: 3px;
  flex-shrink: 0; line-height: 1.5;
}
.tag-method { font-family: inherit; }
.tag-post { background: rgba(16,185,129,0.12); color: var(--success); }
.tag-get { background: rgba(59,130,246,0.12); color: var(--info); }
.tag-put { background: rgba(245,158,11,0.12); color: var(--warning); }
.tag-delete { background: rgba(239,68,68,0.12); color: var(--danger); }
.log-status {
  display: inline-flex; align-items: center; padding: 0 5px;
  font-size: 10px; font-weight: 600; border-radius: 3px;
  flex-shrink: 0; line-height: 1.5; min-width: 28px; justify-content: center;
}
.st-good { background: rgba(16,185,129,0.12); color: var(--success); }
.st-bad { background: rgba(239,68,68,0.12); color: var(--danger); }
.st-warn { background: rgba(245,158,11,0.12); color: var(--warning); }
.st-ok { background: rgba(16,185,129,0.12); color: var(--success); }
.st-fail { background: rgba(239,68,68,0.12); color: var(--danger); }
.log-label {
  display: inline-flex; align-items: center; padding: 0 5px;
  font-size: 10px; font-weight: 600; border-radius: 3px;
  flex-shrink: 0; line-height: 1.5;
}
.lbl-refresh { background: rgba(245,158,11,0.12); color: var(--warning); }
.lbl-warmup { background: rgba(59,130,246,0.12); color: var(--info); }
.lbl-fallback { background: rgba(139,92,246,0.12); color: var(--purple); }
.lbl-auth { background: rgba(239,68,68,0.12); color: var(--danger); }
.lbl-event { background: rgba(255,255,255,0.05); color: var(--tertiary); }
.lbl-req { background: rgba(59,130,246,0.12); color: var(--info); }
.lbl-try { background: rgba(255,255,255,0.08); color: var(--secondary); }
.lbl-cancel { background: rgba(239,68,68,0.12); color: var(--danger); }
.log-model { color: var(--secondary); flex-shrink: 0; }
.log-acc { color: var(--tertiary); flex-shrink: 0; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
.log-dur { color: var(--tertiary); flex-shrink: 0; }
.log-tk { color: var(--info); flex-shrink: 0; font-size: 11px; }
.log-msg { color: var(--tertiary); flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; min-width: 50px; }
.log-msg.err-text { color: var(--danger); }
.log-sep { color: var(--border); flex-shrink: 0; }
.empty-msg {
  padding: 40px 20px; text-align: center; color: var(--tertiary); font-size: 13px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.bottombar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 20px; border-top: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; font-size: 11px; color: var(--tertiary);
}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">GrokProxy</span>
  <a href="/">← Dashboard</a>
  <span class="spacer"></span>
  <div class="controls">
    <button class="ctrl-btn" id="pauseAllBtn">⏸ Pause All</button>
    <button class="ctrl-btn danger" id="clearAllBtn">✕ Clear All</button>
  </div>
</div>

<div class="split">
  <!-- System panel: warmup, refresh, auth, fallback -->
  <div class="panel" id="sysPanel">
    <div class="panel-header">
      <span class="panel-title">System</span>
      <span class="panel-count" id="sysCount">0</span>
      <div class="panel-controls">
        <button class="panel-btn" id="sysPauseBtn">⏸</button>
        <button class="panel-btn" id="sysClearBtn">✕</button>
      </div>
    </div>
    <div class="log-wrap" id="sysWrap">
      <div id="sysConsole"></div>
      <div class="empty-msg" id="sysEmpty">Waiting for system events...</div>
    </div>
  </div>

  <!-- API panel: proxy requests -->
  <div class="panel" id="apiPanel">
    <div class="panel-header">
      <span class="panel-title">API Requests</span>
      <span class="panel-count" id="apiCount">0</span>
      <div class="panel-controls">
        <button class="panel-btn" id="apiPauseBtn">⏸</button>
        <button class="panel-btn" id="apiClearBtn">✕</button>
      </div>
    </div>
    <div class="log-wrap" id="apiWrap">
      <div id="apiConsole"></div>
      <div class="empty-msg" id="apiEmpty">Waiting for API requests...</div>
    </div>
  </div>
</div>

<div class="bottombar">
  <span id="wsStatus">● Connected</span>
</div>

<script>
const $ = (id) => document.getElementById(id);
const WS_URL = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/log`;

const sysEvents = [];
const apiEvents = [];
let sysPaused = false;
let apiPaused = false;

function isSystemEvent(e) {
  const k = (e.kind || "").toLowerCase();
  if (k.startsWith("proxy_")) return false;
  return k.startsWith("refresh_") || k.startsWith("warmup_") || k.includes("fallback") || k.includes("auth") || k === "event";
}

function fmtTime(ts) {
  const d = new Date((ts || 0) * 1000);
  return d.toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function dotClass(kind, status) {
  const k = (kind || "").toLowerCase();
  if (k.includes("proxy_ok") || k.includes("refresh_ok") || k.includes("warmup_ok")) return "dot-ok";
  if (k.includes("proxy_err") || k.includes("refresh_err") || k.includes("warmup_err") || k.includes("auth_fail")) return "dot-err";
  if (k.includes("fallback")) return "dot-purple";
  if (k.includes("refresh") || k.includes("auth")) return "dot-warn";
  if (status != null) return status < 400 ? "dot-ok" : "dot-err";
  return "dot-dim";
}

function statusTag(st) {
  if (st == null) return "";
  const cls = st < 300 ? "st-good" : st < 400 ? "st-warn" : "st-bad";
  return `<span class="log-status ${cls}">${st}</span>`;
}

function labelTag(text, cls) {
  return `<span class="log-label ${cls}">${text}</span>`;
}

function escapeHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderLine(e) {
  const kind = (e.kind || "").toLowerCase();
  const dot = dotClass(kind, e.status);
  const time = fmtTime(e.ts);
  let parts = [];

  if (kind === "proxy_req") {
    parts.push(labelTag("REQ", "lbl-req"));
    const m = e.method || "?";
    parts.push(`<span class="log-model">${m}</span>`);
    if (e.model) parts.push(`<span class="log-model">${e.model}</span>`);
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }
  else if (kind === "proxy_try") {
    parts.push(labelTag("TRY", "lbl-try"));
    if (e.account) parts.push(`<span class="log-acc">${e.account}</span>`);
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }
  else if (kind === "proxy_fallback") {
    parts.push(labelTag("FALLBACK", "lbl-fallback"));
    if (e.account) parts.push(`<span class="log-acc">${e.account}</span>`);
    if (e.status) parts.push(statusTag(e.status));
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }
  else if (kind.startsWith("proxy_")) {
    const isErr = kind.includes("_err");
    const m = e.method || "?";
    const mCls = "tag-" + m.toLowerCase();
    parts.push(`<span class="log-tag tag-method ${mCls}">${m}</span>`);
    if (e.status) parts.push(statusTag(e.status));
    if (e.model) parts.push(`<span class="log-model">${e.model}</span>`);
    if (e.duration_ms) parts.push(`<span class="log-dur">${(e.duration_ms / 1000).toFixed(1)}s</span>`);
    if (e.tokens) parts.push(`<span class="log-tk">${e.tokens}tk</span>`);
    if (e.account) parts.push(`<span class="log-acc">${e.account}</span>`);
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg ${isErr ? 'err-text' : ''}">${escapeHtml(msg)}</span>`);
  }
  else if (kind.startsWith("refresh_")) {
    const isOk = kind.includes("_ok");
    parts.push(labelTag("REFRESH", "lbl-refresh"));
    if (e.account) parts.push(`<span class="log-acc">${e.account}</span>`);
    parts.push(`<span class="log-status ${isOk ? 'st-ok' : 'st-fail'}">${isOk ? 'OK' : 'FAIL'}</span>`);
    if (e.duration_ms) parts.push(`<span class="log-dur">${(e.duration_ms / 1000).toFixed(1)}s</span>`);
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }
  else if (kind.startsWith("warmup_")) {
    if (kind.includes("cancel")) {
      parts.push(labelTag("CANCEL", "lbl-cancel"));
    } else {
      const isOk = kind.includes("_ok");
      const isTry = kind.includes("_try");
      parts.push(labelTag(isTry ? "WARMUP" : "WARMUP", "lbl-warmup"));
      if (e.account) parts.push(`<span class="log-acc">${e.account}</span>`);
      if (!isTry) {
        parts.push(`<span class="log-status ${isOk ? 'st-ok' : 'st-fail'}">${isOk ? 'OK' : 'FAIL'}</span>`);
      }
    }
    if (e.account && kind.includes("cancel")) parts.push(`<span class="log-acc">${e.account}</span>`);
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }
  else if (kind.includes("fallback")) {
    parts.push(labelTag("FALLBACK", "lbl-fallback"));
    if (e.account) parts.push(`<span class="log-acc">${e.account}</span>`);
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }
  else if (kind.includes("auth")) {
    parts.push(labelTag("AUTH", "lbl-auth"));
    if (e.account) parts.push(`<span class="log-acc">${e.account}</span>`);
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }
  else {
    parts.push(labelTag((e.kind || "event").replace(/_/g, " "), "lbl-event"));
    const msg = e.message || "";
    if (msg) parts.push(`<span class="log-msg">${escapeHtml(msg)}</span>`);
  }

  return `<span class="log-time">${time}</span><span class="log-dot ${dot}"></span>${parts.join('<span class="log-sep">·</span>')}`;
}

function addToPanel(e, events, consoleId, emptyId, countId, wrapId, paused) {
  events.push(e);
  const div = document.createElement("div");
  div.className = "log-line";
  div.innerHTML = renderLine(e);
  div.dataset.kind = e.kind || "";
  div.dataset.status = e.status != null ? String(e.status) : "";
  div.dataset.query = ((e.account || "") + " " + (e.model || "") + " " + (e.message || "")).toLowerCase();

  $(consoleId).appendChild(div);
  $(countId).textContent = events.length;
  $(emptyId).style.display = "none";
  if (!paused) $(wrapId).scrollTop = $(wrapId).scrollHeight;
}

function addEvent(e) {
  if (e.kind === "ping") return;
  if (isSystemEvent(e)) {
    addToPanel(e, sysEvents, "sysConsole", "sysEmpty", "sysCount", "sysWrap", sysPaused);
  } else {
    addToPanel(e, apiEvents, "apiConsole", "apiEmpty", "apiCount", "apiWrap", apiPaused);
  }
}

async function preload() {
  try {
    const data = await fetch("/api/events?limit=200").then(r => r.json());
    const evts = (data.events || []).slice().reverse();
    for (const e of evts) {
      addEvent({ kind: e.kind || "event", message: e.message || "", ts: e.ts || 0 });
    }
  } catch {}
}

function connectWs() {
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    $("wsStatus").textContent = "● Connected";
    $("wsStatus").style.color = "var(--success)";
  };
  ws.onclose = () => {
    $("wsStatus").textContent = "● Disconnected (reconnecting...)";
    $("wsStatus").style.color = "var(--danger)";
    setTimeout(connectWs, 2000);
  };
  ws.onmessage = (ev) => {
    try { addEvent(JSON.parse(ev.data)); } catch {}
  };
}

// Panel controls
$("sysPauseBtn").onclick = () => {
  sysPaused = !sysPaused;
  $("sysPauseBtn").textContent = sysPaused ? "▶" : "⏸";
  $("sysPauseBtn").classList.toggle("active", sysPaused);
  if (!sysPaused) $("sysWrap").scrollTop = $("sysWrap").scrollHeight;
};
$("apiPauseBtn").onclick = () => {
  apiPaused = !apiPaused;
  $("apiPauseBtn").textContent = apiPaused ? "▶" : "⏸";
  $("apiPauseBtn").classList.toggle("active", apiPaused);
  if (!apiPaused) $("apiWrap").scrollTop = $("apiWrap").scrollHeight;
};

$("sysClearBtn").onclick = () => {
  sysEvents.length = 0;
  $("sysConsole").innerHTML = "";
  $("sysCount").textContent = "0";
  $("sysEmpty").style.display = "block";
};
$("apiClearBtn").onclick = () => {
  apiEvents.length = 0;
  $("apiConsole").innerHTML = "";
  $("apiCount").textContent = "0";
  $("apiEmpty").style.display = "block";
};

// Global controls
$("pauseAllBtn").onclick = () => {
  const anyActive = !sysPaused || !apiPaused;
  sysPaused = anyActive;
  apiPaused = anyActive;
  $("pauseAllBtn").textContent = anyActive ? "▶ Resume All" : "⏸ Pause All";
  $("pauseAllBtn").classList.toggle("active", anyActive);
  $("sysPauseBtn").textContent = sysPaused ? "▶" : "⏸";
  $("sysPauseBtn").classList.toggle("active", sysPaused);
  $("apiPauseBtn").textContent = apiPaused ? "▶" : "⏸";
  $("apiPauseBtn").classList.toggle("active", apiPaused);
  if (!sysPaused) $("sysWrap").scrollTop = $("sysWrap").scrollHeight;
  if (!apiPaused) $("apiWrap").scrollTop = $("apiWrap").scrollHeight;
};
$("clearAllBtn").onclick = () => {
  $("sysClearBtn").click();
  $("apiClearBtn").click();
  fetch("/api/events/clear", { method: "POST" }).catch(() => {});
};

preload();
connectWs();
</script>
</body>
</html>
